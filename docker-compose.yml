services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:5555:5555"
    volumes:
      - ./backend/instance:/app/instance
      - ./backend/service-account.json:/app/service-account.json:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: /projects/ATK/api
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
