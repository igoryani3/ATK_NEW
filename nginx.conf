server {
    listen 80;
    server_name abiteam.tech www.abiteam.tech;

    # ATK Transit Application at /projects/ATK
    location /projects/ATK {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite to remove /projects/ATK prefix for Next.js
        rewrite ^/projects/ATK/(.*) /$1 break;
    }

    # Backend API at /projects/ATK/api
    location /projects/ATK/api {
        proxy_pass http://localhost:5555/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers (if needed)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Health check endpoint
    location /projects/ATK/health {
        proxy_pass http://localhost:5555/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static files for ATK Transit
    location /projects/ATK/_next/static {
        proxy_pass http://localhost:3000/_next/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/atk_transit_access.log;
    error_log /var/log/nginx/atk_transit_error.log;
}

